<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Checkup - SmartCare</title>
    <link rel="stylesheet" href="./assets/css/checkup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Additional styles */
        .required {
            color: #e53e3e;
            font-weight: bold;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid #fcc;
            display: none;
        }
        
        .success-message {
            background: #dfd;
            color: #373;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid #afa;
            display: none;
        }
        
        /* Hidden patient ID field */
        .hidden-field {
            display: none;
        }
    </style>
</head>
<body>
    <div class="checkup-container">
        <!-- Header -->
        <div class="checkup-header">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <h1><i class="fas fa-stethoscope"></i> Health Checkup Form</h1>
            <p>Please fill your current health details</p>
        </div>

        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step active">1. Personal Info</div>
            <div class="step">2. Symptoms</div>
            <div class="step">3. Choose Doctor</div>
        </div>

        <!-- Checkup Form -->
        <form class="checkup-form" id="checkupForm">
            <!-- Hidden Patient ID (if needed from login) -->
            <div class="hidden-field">
                <input type="hidden" id="patientId" value="">
            </div>

            <!-- Personal Information Section -->
            <div class="form-section">
                <h2><span>1</span> Personal Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Age <span class="required">*</span></label>
                        <input type="number" id="age" placeholder="Age in years" min="1" max="120" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Weight (kg) <span class="required">*</span></label>
                        <input type="number" id="weight" placeholder="Weight in kg" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Height (cm) <span class="required">*</span></label>
                        <input type="number" id="height" placeholder="Height in cm" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select id="bloodGroup">
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Medical Information Section -->
            <div class="form-section">
                <h2><span>2</span> Medical Information</h2>
                
                <div class="form-group">
                    <label>Previous Diseases</label>
                    <div class="checkbox-group" id="diseaseCheckboxes">
                        <label><input type="checkbox" value="Diabetes"> Diabetes</label>
                        <label><input type="checkbox" value="High Blood Pressure"> High Blood Pressure</label>
                        <label><input type="checkbox" value="Asthma"> Asthma</label>
                        <label><input type="checkbox" value="Heart Disease"> Heart Disease</label>
                        <label><input type="checkbox" value="Thyroid"> Thyroid</label>
                        <label><input type="checkbox" value="None"> None</label>
                    </div>
                    <input type="text" id="otherDiseases" placeholder="Other diseases (if any)" class="other-input">
                </div>

                <div class="form-group">
                    <label>Current Symptoms <span class="required">*</span></label>
                    <textarea id="symptoms" placeholder="Describe your current symptoms in detail (fever, cough, pain, headache, body,etc.)" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>Symptom Duration <span class="required">*</span></label>
                    <select id="symptomDuration" required>
                        <option value="">How long have you had symptoms?</option>
                        <option value="Less than 24 hours">Less than 24 hours</option>
                        <option value="1-3 days">1-3 days</option>
                        <option value="4-7 days">4-7 days</option>
                        <option value="1-2 weeks">1-2 weeks</option>
                        <option value="More than 2 weeks">More than 2 weeks</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Pain Level (1-10)</label>
                        <input type="range" id="painLevel" min="1" max="10" value="5" class="slider">
                        <div class="slider-labels">
                            <span id="painLabel">1 (Mild) - Current: 5</span>
                            <span>10 (Severe)</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Body Temperature (°C)</label>
                        <input type="number" id="temperature" placeholder="e.g., 37.5" step="0.1">
                    </div>
                </div>
            </div>

            <!-- Additional Notes -->
            <div class="form-section">
                <h2><span>3</span> Additional Information</h2>
                
                <div class="form-group">
                    <label>Current Medications</label>
                    <textarea id="medications" placeholder="List any medications you're currently taking" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Allergies</label>
                    <textarea id="allergies" placeholder="List any known allergies" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea id="notes" placeholder="Any other information you want to share with the doctor" rows="3"></textarea>
                </div>
            </div>

            <!-- Error and Success Messages -->
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <!-- Submit Button -->
            <div class="form-actions">
                <button type="button" id="submitBtn" class="submit-btn">
                    <i class="fas fa-user-md"></i> Proceed to Choose Doctor →
                </button>
                <p class="form-note"><span class="required">*</span> Required fields must be filled</p>
            </div>
        </form>
    </div>

    <!-- JavaScript -->
    <script src="./assets/js/checkup.js"></script>
</body>
</html>
